services:

  # =============================================
  # KAFKA + ZOOKEEPER (cola de mensajes)
  # =============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr"
    healthcheck:
      test: echo ruok | nc localhost 2181 | grep imok
      interval: 10s
      retries: 10
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 10s
      retries: 10
      start_period: 30s

  # UI para ver topics y mensajes de Kafka
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8180:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: demo
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # =============================================
  # POSTGRESQL (base de datos)
  # =============================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U demo
      interval: 5s
      retries: 5

  # =============================================
  # PRODUCER (envia mensajes a Kafka)
  # =============================================
  producer:
    build: ./producer
    depends_on:
      kafka:
        condition: service_healthy

  # =============================================
  # CONSUMER (lee de Kafka, guarda en DB, expone metricas)
  # =============================================
  consumer:
    build: ./consumer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    expose:
      - "8001"

  # =============================================
  # AIRFLOW (orquestador - health check cada minuto)
  # =============================================
  airflow:
    image: apache/airflow:2.10.5
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@demo.com &&
      airflow scheduler &
      airflow webserver --port 8080
      "

  # =============================================
  # PROMETHEUS (recolecta metricas)
  # =============================================
  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  # =============================================
  # LOKI (almacena logs)
  # =============================================
  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3101:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  # =============================================
  # PROMTAIL (recolecta logs de Docker -> Loki)
  # =============================================
  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  # =============================================
  # GRAFANA (dashboards de metricas + logs)
  # =============================================
  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml

volumes:
  pg_data:
